# WordPress Multisite Configuration (Subdomains mode)
server {
    listen 80;
    server_name ~^(.+\.)?boom\.local$ boom.local;
    root /var/www/html;

    index index.php;

    # Logs
    access_log /var/log/nginx/wp-access.log;
    error_log /var/log/nginx/wp-error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # WordPress rewrite rules for multisite (subdomains)
    if (!-e $request_filename) {
        rewrite ^/wp-json/?$ /index.php?rest_route=/ last;
        rewrite ^/wp-json/(.*)$ /index.php?rest_route=/$1 last;
        rewrite ^/([_0-9a-zA-Z-]+/)?wp-admin$ $1wp-admin/ permanent;
        rewrite ^([_0-9a-zA-Z-]+)?(/wp-.*) $2 last;
        rewrite ^([_0-9a-zA-Z-]+)?(/.*\.php)$ $2 last;
        rewrite ^/(.*)$ /index.php last;
    }

    # Static content caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # PHP handler
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass wordpress:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        # Multisite domain matching is done without the external published port.
        fastcgi_param HTTP_HOST $host;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # Security: deny access to sensitive files
    location ~ /\. {
        deny all;
    }

    location ~ ~$ {
        deny all;
    }

    location = /wp-config.php {
        deny all;
    }
}
